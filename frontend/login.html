<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CloudTok - Login</title>

		<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/login.css">

</head>

<body>

<div class="authPage">

<div class="authBox">

<h1>☁ CloudTok</h1>

<h2>Login</h2>

<input
id="username"
type="text"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button id="loginBtn">

Login

</button>

<p>

Don't have an account?

<a href="signup.html">

Sign Up

</a>

</p>

</div>

</div>

<script src="assets/js/database/users.js"></script>
		<script src="assets/js/database/databaseMigration.js"></script>
		
		<script>

if(
localStorage.getItem(
"CloudTokCurrentUser"
)
){

window.location.replace(
"profile.html?user=" +
encodeURIComponent(
localStorage.getItem(
"CloudTokCurrentUser"
)
)

);

}

</script>
		
<script src="assets/js/sign/login.js"></script>

</body>

</html>
